name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Rust Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-rs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend-rs

      - name: Format Check
        run: cargo fmt --check

      - name: Workspace Check
        run: cargo check --workspace

      - name: Workspace Test
        run: cargo test --workspace

      - name: Build Backend App
        run: cargo build -p tmv-backend-app

      - name: Verify Generated Contracts
        run: cargo run -p tmv-contract-export -- --check

  backend-macos:
    name: Rust Backend (macOS)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: backend-rs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend-rs

      - name: Format Check
        run: cargo fmt --check

      - name: Workspace Check
        run: cargo check --workspace

      - name: Workspace Test
        run: cargo test --workspace

      - name: Build Backend App
        run: cargo build -p tmv-backend-app

      - name: Verify Generated Contracts
        run: cargo run -p tmv-contract-export -- --check

  web:
    name: Web Lint/Test/Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
